<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ETERNA · The Wedding Experience</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<audio
    id="bgMusic"
    src="audio/married-life.mp3"
    preload="auto"
    loop>
</audio>

<!-- ========================= -->
<!-- PORTADA -->
<!-- ========================= -->

<section id="cover" class="screen active">

    <img
        src="cover.png"
        class="cover-image"
        alt="ETERNA">

    <button id="startButton">
        Tocar para comenzar
    </button>

</section>

<!-- ========================= -->
<!-- PRÓLOGO -->
<!-- ========================= -->

<section id="prologue" class="screen">

  <div class="prologue-content">

    <h1>ETERNA</h1>

    <h2>The Wedding Experience</h2>

    <p>

        Toda gran historia de amor
        merece ser contada.

    </p>

</div>

</section>

<!-- ========================= -->
<!-- LIBRO CERRADO -->
<!-- ========================= -->

<section id="closedBook" class="screen">

    <div id="closedBook3D">

    <div class="bookShadow"></div>

    <div class="book3D">

        <div class="bookSpine"></div>

        <div class="bookCover" id="bookCover">
            <img src="cover.png" alt="ETERNA">
        </div>

        <div class="bookPages">

    <div class="pageStack"></div>

    <img src="images/libro/pagina-01.png" id="previewPage">

</div>

</div>

        <img
            src="monograma.png"
            alt="Monograma">

    </div>

</section>

<!-- ========================= -->
<!-- LIBRO -->
<!-- ========================= -->

<section id="book">

    <div id="bookContainer">

        <div id="page" class="page">

            <div class="page-face front">

                <img id="frontImage">

            </div>

            <div class="page-face back">

                <img id="backImage">

            </div>

        </div>

    </div>

</section>
<!-- ========================= -->
<!-- CONTRAPORTADA -->
<!-- ========================= -->

<section id="backCover" class="screen">

    <div class="back-content">

        <h1>ETERNA</h1>

        <h2>The Wedding Experience</h2>

        <p>

            Creado con amor por<br>
            Miguel &amp; Luis

        </p>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
