<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ETERNA</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================
         PORTADA
    =========================== -->

    <section id="cover" class="screen active">

        <button id="startButton"></button>

    </section>

    <!-- ==========================
         PRÓLOGO
    =========================== -->

    <section id="prologue" class="screen">

        <div class="center">

            <p class="quote">
                Toda gran historia de amor merece ser contada...
            </p>

        </div>

    </section>

    <!-- ==========================
         LIBRO
    =========================== -->
    <section id="closedBook" class="screen">

    <div id="closedBook3D">

        <div class="bookShadow"></div>

        <div class="bookPages"></div>

        <div class="bookCover">

            <img src="monograma.png" class="bookLogo" alt="Monograma">

            <h1>ETERNA</h1>

            <h2>The Wedding Experience</h2>

        </div>

    </div>

    <div class="tapMessage">
        Toca el libro para abrirlo
    </div>

</section>
    <section id="book" class="screen">

     <div id="bookContainer">

    <div id="page" class="page">

        <div class="page-face front">
            <img id="frontImage" src="" alt="Página frontal">
        </div>

        <div class="page-face back">
            <img id="backImage" src="" alt="Página trasera">
        </div>

    </div>

</div>

    </section>
<audio id="bgMusic" loop preload="auto">
    <source src="audio/married-life.mp3" type="audio/mpeg">
</audio>
    <script src="script.js"></script>

</body>

</html>
